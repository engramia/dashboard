name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: dummy-build-secret-not-used-at-runtime
          NEXT_PUBLIC_API_URL: http://localhost:8000

  test-unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest
        run: npm run test:unit

  test-e2e:
    name: E2E tests (Playwright + Core stub)
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-test-secret-not-used-in-prod
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Run Playwright (against in-process Core stub)
        run: npm run test:e2e
        env:
          CI: "true"
          USE_CORE_STUB: "1"
          DASHBOARD_TEST_EMAIL: ci-test@engramia.dev
          DASHBOARD_TEST_PASSWORD: ci-test-password
          NEXTAUTH_SECRET: ci-test-secret-not-used-in-prod
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  license-audit:
    name: License audit (drift check)
    runs-on: ubuntu-latest
    # Only runs when dependencies change — audit file is stable when
    # package manifests and the script itself are untouched.
    # docker-publish.yml regenerates canonically on every release tag.
    steps:
      - uses: actions/checkout@v5

      - name: Detect dependency-related changes
        id: deps-changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'package.json'
              - 'package-lock.json'

      - uses: actions/setup-node@v5
        if: steps.deps-changed.outputs.deps == 'true'
        with:
          node-version: "20"
          cache: npm

      - name: Install runtime deps only
        if: steps.deps-changed.outputs.deps == 'true'
        # Must match docker-publish.yml: audit covers what ships in the
        # image, not the dev/test toolchain.
        run: npm ci --omit=dev

      - name: Check DEPENDENCY_LICENSES.md is up to date
        if: steps.deps-changed.outputs.deps == 'true'
        run: node scripts/audit-licenses.mjs --check --fail-on=high
